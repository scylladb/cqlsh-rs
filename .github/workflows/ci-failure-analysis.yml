name: CI Summary

# Analyzes CI failures and posts a structured PR comment with diagnostics.
# On success, updates any existing failure comment to reflect all-passing status.
# Uses pure pattern-matching on cargo/clippy/nextest output — no LLM required.
# Logic lives in .github/scripts/analyze-ci-failures.sh for testability.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  analyze-failure:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Download all CI artifacts using glob patterns (matrix jobs produce suffixed names)
      - name: Download test results
        uses: actions/download-artifact@v7
        with:
          pattern: test-results-*
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
          merge-multiple: true
        continue-on-error: true

      - name: Download clippy results
        uses: actions/download-artifact@v7
        with:
          pattern: clippy-results*
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
          merge-multiple: true
        continue-on-error: true

      - name: Download build results
        uses: actions/download-artifact@v7
        with:
          pattern: build-results-*
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
          merge-multiple: true
        continue-on-error: true

      - name: Download fmt results
        uses: actions/download-artifact@v7
        with:
          pattern: fmt-results*
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
          merge-multiple: true
        continue-on-error: true

      - name: Download integration test results
        uses: actions/download-artifact@v7
        with:
          pattern: integration-test-results-*
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
          merge-multiple: true
        continue-on-error: true

      - name: List downloaded artifacts
        run: find ci-artifacts/ -type f 2>/dev/null || echo "No artifacts downloaded"

      # Get the PR number
      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
            --jq '.[0].number // empty')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Get failed job names
      - name: Get failed jobs
        id: failed-jobs
        run: |
          gh run view ${{ github.event.workflow_run.id }} --json jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | .name' \
            > failed-jobs.txt || true
          echo "Failed jobs:"
          cat failed-jobs.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Run the analysis script — outputs markdown to a file
      - name: Analyze failures
        run: |
          bash .github/scripts/analyze-ci-failures.sh \
            ci-artifacts \
            failed-jobs.txt \
            "${{ github.repository }}" \
            "${{ github.event.workflow_run.id }}" \
            > /tmp/ci-comment-body.md
          echo "Generated comment:"
          cat /tmp/ci-comment-body.md

      # Post or update PR comment — reads from file to avoid backtick interpolation bugs
      - name: Post failure summary comment
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/ci-comment-body.md', 'utf8');
            } catch (e) {
              console.log('No comment body file found:', e.message);
              return;
            }
            if (!body || body.trim() === '') {
              console.log('Empty comment body — skipping');
              return;
            }

            const prNumber = ${{ steps.pr.outputs.number }};
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const marker = '<!-- cqlsh-rs-ci-summary -->';
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
              console.log('Created new comment');
            }

  update-on-success:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read

    steps:
      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
            --jq '.[0].number // empty')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update existing comment to show all passing
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v8
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const marker = '<!-- cqlsh-rs-ci-summary -->';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const existing = comments.data.find(c => c.body.includes(marker));
            if (!existing) {
              console.log('No existing CI summary comment — nothing to update');
              return;
            }

            const runUrl = process.env.RUN_URL;
            const body = [
              marker,
              '## CI Summary',
              '',
              '**Status:** ✅ All jobs passed',
              '',
              '<details>',
              '<summary>✅ <b>Rustfmt</b> — passed</summary>',
              'No issues.',
              '</details>',
              '',
              '<details>',
              '<summary>✅ <b>Clippy</b> — passed</summary>',
              'No issues.',
              '</details>',
              '',
              '<details>',
              '<summary>✅ <b>Tests</b> — passed</summary>',
              'No issues.',
              '</details>',
              '',
              '<details>',
              '<summary>✅ <b>Build</b> — passed</summary>',
              'No issues.',
              '</details>',
              '',
              '---',
              `*🤖 Generated by CI Failure Analyzer • [Full logs](${runUrl})*`
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body
            });
            console.log(`Updated comment ${existing.id} to all-passing status`);
