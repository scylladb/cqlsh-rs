name: CI Failure Analysis

# Analyzes CI failures and posts a structured PR comment with diagnostics.
# Uses pure pattern-matching on cargo/clippy/nextest output — no LLM required.
# Logic lives in .github/scripts/analyze-ci-failures.sh for testability.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  analyze-failure:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Download artifacts from the failed CI run
      - name: Download test results
        uses: actions/download-artifact@v7
        with:
          name: test-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
        continue-on-error: true

      - name: Download clippy results
        uses: actions/download-artifact@v7
        with:
          name: clippy-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
        continue-on-error: true

      - name: Download build results
        uses: actions/download-artifact@v7
        with:
          name: build-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
        continue-on-error: true

      - name: Download fmt results
        uses: actions/download-artifact@v7
        with:
          name: fmt-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-artifacts/
        continue-on-error: true

      # Get the PR number
      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls --jq '.[0].number')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Get failed job names
      - name: Get failed jobs
        id: failed-jobs
        run: |
          gh run view ${{ github.event.workflow_run.id }} --json jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | .name' \
            > failed-jobs.txt
          echo "Failed jobs:"
          cat failed-jobs.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Run the analysis script
      - name: Analyze failures
        id: analyze
        run: |
          {
            echo "comment<<COMMENT_EOF"
            bash .github/scripts/analyze-ci-failures.sh \
              ci-artifacts \
              failed-jobs.txt \
              "${{ github.repository }}" \
              "${{ github.event.workflow_run.id }}"
            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      # Post or update PR comment
      - name: Post failure summary comment
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v8
        with:
          script: |
            const body = `${{ steps.analyze.outputs.comment }}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }}
            });

            const marker = '## CI Failure Summary';
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.startsWith(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ steps.pr.outputs.number }},
                body: body
              });
              console.log('Created new comment');
            }
