name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee fmt-output.txt
      - name: Upload fmt results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: fmt-results
          path: fmt-output.txt
          retention-days: 5

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features --message-format=json 2>&1 | tee clippy-output.json
      - name: Upload clippy results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: clippy-results
          path: clippy-output.json
          retention-days: 5

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          cargo nextest run --all-targets --all-features 2>&1 | tee test-output.log
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.os }}
          path: test-output.log
          retention-days: 5

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        shell: bash
        run: |
          set -o pipefail
          cargo build --release --message-format=json 2>&1 | tee build-output.json
      - name: Upload build results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-results-${{ matrix.os }}
          path: build-output.json
          retention-days: 5

  integration:
    name: Integration Tests (${{ matrix.db_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - db_name: scylladb-2026.1
            db_image: scylladb/scylla:2026.1
            db_args: "--smp 1 --memory 512M --overprovisioned 1 --skip-wait-for-gossip-to-settle 0"
            db_env: ""
          - db_name: scylladb-2025.1
            db_image: scylladb/scylla:2025.1
            db_args: "--smp 1 --memory 512M --overprovisioned 1 --skip-wait-for-gossip-to-settle 0"
            db_env: ""
          - db_name: cassandra-4.1
            db_image: cassandra:4.1
            db_args: ""
            db_env: "-e CASSANDRA_DC=datacenter1 -e JVM_EXTRA_OPTS=-Dcassandra.enable_materialized_views=true"
          - db_name: cassandra-5.0
            db_image: cassandra:5.0
            db_args: ""
            db_env: "-e CASSANDRA_DC=datacenter1 -e JVM_EXTRA_OPTS=-Dcassandra.enable_materialized_views=true"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Temporary workaround: testcontainers-rs fails to start containers on
      # GitHub Actions (Ubuntu 24.04 / Docker 27) due to Docker networking driver
      # failing with "address already in use" when setting up port forwarding.
      # Goal: restore plain `cargo test` with testcontainers once root cause is fixed.
      # Tracked: https://github.com/scylladb/cqlsh-rs/issues/TODO
      - name: Start database (${{ matrix.db_name }})
        run: |
          docker run -d --name testdb \
            -p 9042:9042 \
            ${{ matrix.db_env }} \
            ${{ matrix.db_image }} \
            ${{ matrix.db_args }}
          echo "Waiting for ${{ matrix.db_name }} to be ready..."
          for i in $(seq 1 60); do
            if docker exec testdb cqlsh -e "SELECT now() FROM system.local;" 2>/dev/null; then
              echo "${{ matrix.db_name }} ready after ${i} attempt(s)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "${{ matrix.db_name }} failed to become ready"
              docker logs testdb
              exit 1
            fi
            sleep 5
          done
      - name: Run integration tests
        env:
          SCYLLA_TEST_HOST: localhost
          SCYLLA_TEST_PORT: "9042"
        run: |
          set -o pipefail
          cargo test --test integration -- --ignored --test-threads=1 2>&1 | tee integration-output.log
        timeout-minutes: 20
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-test-results-${{ matrix.db_name }}
          path: integration-output.log
          retention-days: 5

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Run coverage
        run: |
          cargo tarpaulin \
            --all-features \
            --workspace \
            --timeout 120 \
            --out xml \
            --output-dir coverage/
        timeout-minutes: 20
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
