name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: |
          cargo fmt --all -- --check 2>&1 | tee fmt-output.txt
      - name: Upload fmt results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fmt-results
          path: fmt-output.txt
          retention-days: 5

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features --message-format=json 2>&1 | tee clippy-output.json
      - name: Upload clippy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-results
          path: clippy-output.json
          retention-days: 5

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run tests
        run: |
          cargo nextest run --all-targets --all-features 2>&1 | tee test-output.log
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-output.log
          retention-days: 5

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: |
          set -o pipefail
          cargo build --release --message-format=json 2>&1 | tee build-output.json
      - name: Upload build results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: build-output.json
          retention-days: 5
