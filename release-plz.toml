# release-plz configuration for automated releases.
# See: https://release-plz.dev/docs/config
#
# Release flow:
#   1. Merge feat:/fix: commits to main
#   2. release-plz creates/updates a release PR (Cargo.toml bump + CHANGELOG)
#   3. Maintainer merges the release PR
#   4. release-plz detects the version bump, creates a git tag + GitHub Release,
#      and publishes to crates.io

[workspace]
# Update CHANGELOG.md when creating release PRs
changelog_update = true
# Create GitHub Releases
git_release_enable = true
# Create git tags (format: v{version} for single-crate projects)
git_tag_enable = true
