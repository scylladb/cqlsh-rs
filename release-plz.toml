# release-plz configuration for automated releases.
# See: https://release-plz.dev/docs/config
#
# Release flow:
#   1. Maintainer bumps version in Cargo.toml and updates CHANGELOG.md
#   2. On merge to main, CI runs `release-plz release` which detects
#      the version bump, creates a git tag + GitHub Release, and
#      publishes to crates.io

[workspace]
# Include CHANGELOG.md changes in releases
changelog_update = true
# Create GitHub Releases
git_release_enable = true
# Create git tags (format: v{version} for single-crate projects)
git_tag_enable = true
